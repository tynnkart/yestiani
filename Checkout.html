<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Struk Pembayaran</title>

    <style>
        body {
            background: #8e44ad;
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
        }

        .struk {
            width: 350px;
            margin: 40px auto;
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0,0,0,0.2);
        }

        h2 {
            text-align: center;
            color: #6a1b9a;
            margin-bottom: 5px;
        }

        .tanggal {
            text-align: center;
            font-size: 12px;
            color: gray;
            margin-bottom: 15px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th {
            border-bottom: 2px solid #6a1b9a;
            text-align: left;
            padding: 8px;
            font-size: 14px;
        }

        td {
            padding: 8px;
            font-size: 14px;
            border-bottom: 1px dashed #ccc;
        }

        .total-row {
            font-weight: bold;
            color: green;
        }

        .btn-cetak, .btn-kembali {
            display: block;
            width: 100%;
            margin-top: 10px;
            padding: 10px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            text-align: center;
            text-decoration: none;
            box-sizing: border-box;
        }

        .btn-cetak {
            background: #6a1b9a;
            color: white;
        }

        .btn-cetak:hover {
            background: #4a148c;
        }

        .btn-kembali {
            background: #ecf0f1;
            color: #333;
        }

        /* MODE PRINT */
        @media print {
            body {
                background: white;
            }

            .btn-cetak, .btn-kembali {
                display: none;
            }

            .struk {
                box-shadow: none;
                margin: 0;
                width: 100%;
            }
        }
    </style>
</head>

<body>

<div class="struk">

    <h2>Struk Pembayaran</h2>
    <p id="tampil-tanggal" class="tanggal"></p>

    <table>
        <thead>
            <tr>
                <th>Nama</th>
                <th>Qty</th>
                <th>Total</th>
            </tr>
        </thead>
        <tbody id="isi-tabel">
            <!-- Data keranjang akan masuk di sini -->
        </tbody>
        <tfoot>
            <tr>
                <td colspan="2"><b>Total</b></td>
                <td class="total-row" id="grand-total">Rp 0</td>
            </tr>
        </tfoot>
    </table>

    <button class="btn-cetak" onclick="window.print()">🖨️ Cetak Struk</button>
    <a href="index.html" class="btn-kembali">Kembali ke Toko</a>

</div>

<script>
    // 1. Tampilkan Tanggal Otomatis
    const sekarang = new Date();
    const opsi = { day: '2-digit', month: '2-digit', year: 'numeric', hour: '2-digit', minute: '2-digit' };
    document.getElementById('tampil-tanggal').innerText = "Tanggal: " + sekarang.toLocaleString('id-ID', opsi);

    // 2. Ambil data dari localStorage
    const keranjang = JSON.parse(localStorage.getItem('keranjangBuku')) || [];
    const wadahTabel = document.getElementById('isi-tabel');
    let totalBelanja = 0;

    // 3. Render data ke tabel
    if (keranjang.length === 0) {
        wadahTabel.innerHTML = "<tr><td colspan='3' style='text-align:center;'>Keranjang Kosong</td></tr>";
    } else {
        keranjang.forEach(item => {
            const subtotal = item.harga * item.jumlah;
            totalBelanja += subtotal;

            const baris = `
                <tr>
                    <td>${item.nama}</td>
                    <td>${item.jumlah}</td>
                    <td>Rp ${subtotal.toLocaleString('id-ID')}</td>
                </tr>
            `;
            wadahTabel.innerHTML += baris;
        });
    }

    // 4. Update Total Akhir
    document.getElementById('grand-total').innerText = "Rp " + totalBelanja.toLocaleString('id-ID');

    // Opsional: Jika ingin mengosongkan keranjang setelah cetak/bayar
    // localStorage.removeItem('keranjangBuku');
</script>

</body>
</html>
